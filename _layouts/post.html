---
layout: default
---
<article>
  <h1>{{ page.title }}</h1>
  <div class="meta">{% if page.tag %}{{ page.tag }} · {% endif %}{{ page.date | date: "%B %-d, %Y" }}</div>
  <div class="prose">{{ content }}</div>
  <p style="margin-top:40px"><a class="back" href="{{ '/blog/' | relative_url }}">&larr; All posts</a></p>
</article>
